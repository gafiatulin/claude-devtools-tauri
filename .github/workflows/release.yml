name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create self-signed certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "build" $KEYCHAIN_PATH
          security set-keychain-settings $KEYCHAIN_PATH
          security unlock-keychain -p "build" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          cat > codesign.cnf <<CNFEOF
          [req]
          distinguished_name = req_dn
          [req_dn]
          [v3_cs]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = codeSigning
          CNFEOF
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem \
            -days 365 -nodes -subj "/CN=Claude DevTools Self-Signed" \
            -extensions v3_cs -config codesign.cnf
          openssl pkcs12 -export -out cert.p12 -inkey key.pem -in cert.pem \
            -password pass:build -legacy

          security import cert.p12 -k $KEYCHAIN_PATH -P build \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" $KEYCHAIN_PATH

          security find-identity -v -p codesigning $KEYCHAIN_PATH

          rm -f key.pem cert.pem cert.p12 codesign.cnf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "Claude DevTools Self-Signed"
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude DevTools Tauri ${{ github.ref_name }}"
          files: "**/*.dmg"
          generate_release_notes: true
